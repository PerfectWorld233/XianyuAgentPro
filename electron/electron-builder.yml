appId: com.xianyu.autoagent
productName: XianyuAgentPro
copyright: Copyright © 2024

directories:
  output: ../build/electron-dist
  buildResources: assets

files:
  - main/**/*
  - preload/**/*
  - renderer/dist/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

extraResources:
  - from: ../build/python-dist/bridge/
    to: python-dist/bridge/
    filter:
      - "**/*"

win:
  target:
    - target: dir
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - zh_CN
  language: 2052
